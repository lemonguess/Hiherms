<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Geist:wght@500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#006875",
                    "tertiary": "#ececec",
                    "surface-tint": "#00daf3",
                    "outline-variant": "#3b494c",
                    "secondary-fixed": "#e5e1e4",
                    "on-background": "#e4e2e4",
                    "outline": "#849396",
                    "on-primary-fixed": "#001f24",
                    "surface-bright": "#39393b",
                    "on-secondary-container": "#b7b4b7",
                    "secondary": "#c8c6c8",
                    "on-tertiary-fixed-variant": "#454747",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "surface-container": "#1f1f21",
                    "on-tertiary-container": "#575959",
                    "background": "#131315",
                    "on-primary-fixed-variant": "#004f58",
                    "inverse-surface": "#e4e2e4",
                    "surface-container": "#1f1f21",
                    "on-tertiary-fixed": "#1a1c1c",
                    "primary": "#c3f5ff",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#1b1b1d",
                    "on-primary-container": "#00626e",
                    "surface": "#131315",
                    "primary-fixed-dim": "#00daf3",
                    "secondary-fixed-dim": "#c8c6c8",
                    "inverse-on-surface": "#303032",
                    "on-error": "#690005",
                    "on-surface": "#e4e2e4",
                    "on-tertiary": "#2f3131",
                    "error": "#ffb4ab",
                    "primary-container": "#00e5ff",
                    "on-secondary-fixed-variant": "#474649",
                    "on-primary": "#00363d",
                    "tertiary-container": "#d0d0d0",
                    "surface-container-low": "#1b1b1d",
                    "surface-container-lowest": "#0e0e10",
                    "on-secondary": "#303032",
                    "error-container": "#93000a",
                    "tertiary-fixed": "#e2e2e2",
                    "surface-container-highest": "#353437",
                    "primary-fixed": "#9cf0ff",
                    "secondary-container": "#474649",
                    "on-surface-variant": "#bac9cc",
                    "surface-dim": "#131315"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "element-gap": "0.75rem",
                    "max-width-chat": "320px",
                    "panel-margin": "1rem",
                    "container-padding": "1.5rem"
            },
            "fontFamily": {
                    "mono-status": ["Geist"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-caps": ["Geist"]
            },
            "fontSize": {
                    "mono-status": ["12px", {"lineHeight": "16px", "letterSpacing": "0", "fontWeight": "500"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                    "headline-md": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                    "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-border {
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .hermes-accent-line {
            border-left: 2px solid #00daf3;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .voice-ring {
            box-shadow: 0 0 15px rgba(0, 218, 243, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-lg overflow-hidden h-screen select-none">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full backdrop-blur-xl bg-surface/70 flex justify-between items-center px-container-padding h-16 z-50">
<div class="font-headline-lg text-headline-lg font-bold text-primary tracking-tighter">HermesPet</div>
<div class="flex items-center gap-element-gap">
<button class="cursor-pointer active:scale-95 text-on-surface-variant hover:text-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined">graphic_eq</span>
</button>
<button class="cursor-pointer active:scale-95 text-on-surface-variant hover:text-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined">battery_charging_full</span>
</button>
<button class="cursor-pointer active:scale-95 text-on-surface-variant hover:text-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined">wifi</span>
</button>
</div>
</header>
<div class="flex h-full pt-16">
<!-- SideNavBar Section -->
<aside class="fixed left-0 top-0 h-screen w-64 rounded-r-xl bg-surface-container/70 backdrop-blur-2xl border-r border-outline-variant/20 shadow-xl flex flex-col py-panel-margin z-40">
<div class="px-6 py-8 flex flex-col items-center gap-2 mb-4">
<div class="w-16 h-16 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-primary">HermesPet</h1>
<p class="font-mono-status text-mono-status text-on-surface-variant opacity-70">V1.0.4 Online</p>
</div>
</div>
<nav class="flex-grow flex flex-col gap-1">
<!-- Active Tab: 当前会话 -->
<div class="bg-secondary-container/50 text-primary border-l-4 border-primary px-4 py-3 flex items-center gap-element-gap cursor-pointer active:scale-[0.98] duration-200">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-body-sm text-body-sm">当前会话</span>
</div>
<div class="text-on-surface-variant px-4 py-3 flex items-center gap-element-gap cursor-pointer hover:bg-surface-variant/40 hover:text-on-surface transition-all active:scale-[0.98] duration-200">
<span class="material-symbols-outlined">history</span>
<span class="font-body-sm text-body-sm">历史记录</span>
</div>
<div class="text-on-surface-variant px-4 py-3 flex items-center gap-element-gap cursor-pointer hover:bg-surface-variant/40 hover:text-on-surface transition-all active:scale-[0.98] duration-200">
<span class="material-symbols-outlined">settings</span>
<span class="font-body-sm text-body-sm">系统设置</span>
</div>
</nav>
<div class="mt-auto px-4">
<div class="text-on-surface-variant px-4 py-3 flex items-center gap-element-gap cursor-pointer hover:bg-surface-variant/40 hover:text-on-surface transition-all active:scale-[0.98] duration-200">
<span class="material-symbols-outlined">info</span>
<span class="font-body-sm text-body-sm">关于</span>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-grow ml-64 relative flex flex-col items-center justify-between p-panel-margin overflow-hidden">
<!-- Chat Canvas -->
<div class="w-full max-w-4xl flex-grow overflow-y-auto space-y-6 pb-24 custom-scrollbar px-4 pt-4">
<!-- User Message -->
<div class="flex justify-end animate-in fade-in slide-in-from-right-4 duration-500">
<div class="max-w-[70%] glass-border bg-surface-container-high/80 backdrop-blur-xl rounded-xl rounded-tr-none px-4 py-3 shadow-lg">
<p class="text-on-surface text-body-lg">Hermes，最近帮我整理的日程怎么样了？</p>
</div>
</div>
<!-- Hermes Message -->
<div class="flex justify-start animate-in fade-in slide-in-from-left-4 duration-500">
<div class="max-w-[70%] hermes-accent-line glass-border bg-surface-container/60 backdrop-blur-xl rounded-xl rounded-tl-none px-4 py-3 shadow-lg">
<p class="text-on-surface text-body-lg">我已经为您同步了本周的所有待办事项。注意到您周四下午有一个重要的设计评审，我已经预留了两个小时的专注时间。需要我现在为您展示详细的时间表吗？</p>
<div class="mt-3 flex gap-2">
<button class="glass-border rounded-full px-3 py-1 text-label-caps font-label-caps text-primary/80 hover:bg-primary/10 transition-all flex items-center gap-1">
<span class="material-symbols-outlined text-sm">event</span>
                                查看时间表
                            </button>
<button class="glass-border rounded-full px-3 py-1 text-label-caps font-label-caps text-on-surface-variant hover:bg-surface-variant transition-all flex items-center gap-1">
<span class="material-symbols-outlined text-sm">edit</span>
                                稍后提醒
                            </button>
</div>
</div>
</div>
<!-- User Message -->
<div class="flex justify-end animate-in fade-in slide-in-from-right-4 duration-500">
<div class="max-w-[70%] glass-border bg-surface-container-high/80 backdrop-blur-xl rounded-xl rounded-tr-none px-4 py-3 shadow-lg">
<p class="text-on-surface text-body-lg">做得好。另外，帮我找一些关于玻璃拟态设计的灵感参考。</p>
</div>
</div>
</div>
<!-- Input Area -->
<div class="absolute bottom-panel-margin w-full max-w-3xl px-panel-margin">
<div class="glass-border bg-surface-container-lowest/90 backdrop-blur-2xl rounded-full p-2 flex items-center gap-2 shadow-2xl transition-all focus-within:ring-2 ring-primary/20">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">add_circle</span>
</button>
<input class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/50 px-2 font-body-lg" placeholder="与 Hermes 交流..." type="text"/>
<div class="flex items-center gap-2 pr-2">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">mic</span>
</button>
<button class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
</div>
<!-- Live2D Overlay Position -->
<div class="fixed right-12 bottom-12 w-96 h-[500px] pointer-events-none z-30">
<div class="relative w-full h-full flex flex-col items-center justify-end">
<!-- Character Placeholder -->
<div class="w-80 h-full relative">
<img alt="Hermes Pet" class="w-full h-full object-contain filter drop-shadow-[0_0_20px_rgba(0,218,243,0.3)]" data-alt="A stylized, futuristic digital companion character with a sleek, minimalist animal-like form. The pet features glowing neon cyan accents along its metallic and translucent glass-like limbs. It is floating in mid-air against a transparent background, surrounded by subtle floating data particles. The character has an expressive face rendered with simple digital light patterns, conveying a calm and helpful personality. High-tech cyberpunk aesthetic with soft cinematic lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_gFseuBeMPNC3guYWVnhA6rUYmkkARm5sxRiVig3MVRgKiya6zmBWktysdVYd8WpQTvbJTfOQsR3w_UQCEwJmREg3yzzdLIBS9MH3zOg2bWcz2_NDQQzSk6tbUtJQQy9jAbrvRPggFCe2faDFlqDT5i0SG84sszRcbmEPPq3XCvUIkZckPBJ9ORxaR3pQS0iHVnMYTu-kEGuDn3bYkXR_T7MFFk06pzd9IY-WFaZKOMfkxH5cU-kf9wOpXlXizTswm57x4OrQt08"/>
</div>
<!-- Voice Activity Ring (Pulse Visual) -->
<div class="absolute bottom-4 w-48 h-4 rounded-full bg-primary/10 blur-xl voice-ring"></div>
<div class="absolute bottom-6 w-32 h-1 bg-gradient-to-r from-transparent via-primary/60 to-transparent"></div>
</div>
</div>
</main>
</div>
<!-- UI Background Decoration -->
<div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_80%_20%,rgba(0,218,243,0.05),transparent_40%),radial-gradient(circle_at_20%_80%,rgba(195,245,255,0.03),transparent_40%)]"></div>
</body></html>
