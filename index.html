<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HiHermes</title>
    <script>
      // Electron fallback bridge: only inject when preload did not expose hermesAPI
      if (typeof require !== 'undefined' && !window.hermesAPI) {
        try {
          const { ipcRenderer } = require('electron');
          window.hermesAPI = {
            sendMessage: (r) => ipcRenderer.invoke('hermes:send-message', r),
            getSession: () => ipcRenderer.invoke('hermes:get-sessions'),
            listSessions: () => ipcRenderer.invoke('hermes:list-sessions'),
            selectSession: (id) => ipcRenderer.invoke('hermes:select-session', id),
            newSession: () => ipcRenderer.invoke('hermes:new-session'),
            onSessionUpdate: (cb) => {
              const h = (_e, d) => cb(d);
              ipcRenderer.on('hermes:session-update', h);
              return () => ipcRenderer.removeListener('hermes:session-update', h);
            },
            getSettings: () => ipcRenderer.invoke('settings:get'),
            setSettings: (p) => ipcRenderer.invoke('settings:set', p),
            onSettingsUpdated: (cb) => {
              const h = (_e, s) => cb(s);
              ipcRenderer.on('settings:updated', h);
              return () => ipcRenderer.removeListener('settings:updated', h);
            },
            openImageDialog: () => ipcRenderer.invoke('dialog:open-image'),
            playTTS: (t) => ipcRenderer.invoke('hermes:voice-play', t),
            onShowSettings: (cb) => {
              const h = () => cb();
              ipcRenderer.on('show-settings', h);
              return () => ipcRenderer.removeListener('show-settings', h);
            }
          };
        } catch(e) { console.warn('Electron API init failed:', e); }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/renderer/main.tsx"></script>
  </body>
</html>
