<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HermesPet Menu</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #00daf3;
  --primary-container: #004f59;
  --on-surface: #e0e0e0;
  --on-surface-variant: #a0a0a0;
  --surface-container-high: rgba(30,30,35,0.7);
  --outline-variant: rgba(255,255,255,0.1);
  --error: #ffb4ab;
  --error-container: #93000a;
}
html, body {
  height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  user-select: none;
  -webkit-app-region: no-drag;
}
body {
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 0;
}
nav {
  width: 256px;
  background: var(--surface-container-high);
  border: 1px solid var(--outline-variant);
  border-radius: 12px;
  padding: 8px 0;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  overflow: hidden;
}
.header {
  padding: 12px 16px;
  margin-bottom: 4px;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  border: 1px solid rgba(0,79,89,0.2);
  background: rgba(0,79,89,0.1);
}
.header-icon .material-symbols-outlined {
  font-size: 20px;
  color: var(--primary-container);
  font-variation-settings: 'FILL' 1;
}
.header h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.header p {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--on-surface-variant);
}
.divider {
  height: 1px;
  background: var(--outline-variant);
  margin: 4px 16px 8px;
}
.divider-thin {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 8px 8px;
}
ul {
  list-style: none;
  padding: 0 8px;
}
li { margin-bottom: 2px; }
button {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border: none;
  background: transparent;
  color: var(--on-surface-variant);
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.15s;
  font-size: 14px;
  font-family: inherit;
}
button:hover {
  background: rgba(255,255,255,0.05);
  color: var(--primary);
}
button:active {
  transform: translateX(4px);
}
button .material-symbols-outlined {
  font-size: 20px;
}
button.active {
  border-left: 4px solid rgba(0,218,243,0.6);
  background: rgba(0,79,89,0.1);
  color: rgba(0,218,243,0.6);
  font-weight: 700;
}
button.active .material-symbols-outlined {
  font-variation-settings: 'FILL' 1;
}
button.danger {
  color: rgba(255,180,171,0.8);
}
button.danger:hover {
  background: rgba(255,180,171,0.1);
  color: var(--error);
}
.shortcut {
  margin-left: auto;
  font-size: 10px;
  color: rgba(160,160,160,0.4);
  font-family: 'JetBrains Mono', monospace;
}
.active-dot {
  margin-left: auto;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary-container);
}
</style>
</head>
<body>
<nav>
  <div class="header">
    <div class="header-inner">
      <div class="header-icon">
        <span class="material-symbols-outlined">smart_toy</span>
      </div>
      <div>
        <h2>HermesPet</h2>
        <p>AI Companion</p>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <ul>
    <li><button data-action="chat"><span class="material-symbols-outlined">chat</span> 开启对话 <span class="shortcut">&#8984;K</span></button></li>
    <li><button data-action="settings"><span class="material-symbols-outlined">settings</span> 系统设置</button></li>
    <li><button data-action="interaction"><span class="material-symbols-outlined">touch_app</span> 交互模式</button></li>
  </ul>
  <div class="divider-thin"></div>
  <ul>
    <li><button data-action="hide"><span class="material-symbols-outlined">visibility_off</span> 隐藏宠物</button></li>
    <li><button data-action="quit" class="danger"><span class="material-symbols-outlined">power_settings_new</span> 退出程序</button></li>
  </ul>
</nav>
<script>
document.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (btn) {
    window.ctxMenu?.action(btn.dataset.action);
  } else if (!e.target.closest('nav')) {
    window.ctxMenu?.close();
  }
});

document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  window.ctxMenu?.close();
});
</script>
</body>
</html>
